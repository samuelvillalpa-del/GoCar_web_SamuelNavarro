<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acceso anticipado | DriveShare</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:Inter;
background:linear-gradient(135deg,#081120,#111827);
color:white;
}

.container{
max-width:900px;
margin:auto;
padding:80px 20px;
text-align:center;
}

h1{
font-size:52px;
margin-bottom:20px;
}

p{
font-size:18px;
color:#cbd5e1;
line-height:1.7;
max-width:650px;
margin:0 auto 40px;
}

.card{
background:white;
color:#0f172a;
padding:40px;
border-radius:20px;
max-width:500px;
margin:40px auto;
box-shadow:0 20px 60px rgba(0,0,0,.3);
}

input{
width:100%;
padding:14px;
margin:10px 0;
border-radius:10px;
border:1px solid #e5e7eb;
font-size:15px;
}

button{
width:100%;
padding:15px;
background:#00C389;
border:none;
border-radius:10px;
color:white;
font-weight:700;
font-size:16px;
cursor:pointer;
margin-top:10px;
}

small{
display:block;
margin-top:15px;
color:#64748b;
font-size:12px;
}

a{
color:#00C389;
text-decoration:none;
}
</style>
</head>

<body>

<div class="container">

<h1>Acceso anticipado</h1>

<p>
Sé de los primeros en probar <strong>GoCar</strong>.  
Estamos lanzando una nueva forma de alquilar vehículos entre particulares.
</p>

<div class="card">

<form>
<input type="text" placeholder="Nombre completo" required>
<input type="email" placeholder="Email" required>
<input type="text" placeholder="Ciudad">
<button type="submit">Solicitar acceso</button>

<small>
Al registrarte aceptas recibir información sobre el lanzamiento.
</small>
</form>

</div>

<p>
<a href="../index.html">← Volver a inicio</a>
</p>

</div>

</body>
</html>
